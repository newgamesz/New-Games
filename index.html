<!DOCTYPE html>
<html lang="pt-BR" class="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes"/>
<title>New Games</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
*:focus{outline:none}
body{margin:0;font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
.dark{
  --bg:#0a0511;--surface:#12092a;--surface2:#1a1035;--surface3:#231845;
  --purple:#c882ff;--purple-mid:#a855f7;--purple-dim:#6d28d9;
  --purple-glow:rgba(168,85,247,0.15);--border:rgba(124,58,237,0.28);
  --border-soft:rgba(255,255,255,0.06);--text:#eee1ff;--text-muted:#a890c8;
  --text-dim:#5a4880;--card:#1a1035;--header-bg:rgba(10,5,17,0.88);
  --danger:#f87171;--success:#4ade80
}
.light{
  --bg:#f5f0ff;--surface:#fff;--surface2:#ede6ff;--surface3:#e0d6ff;
  --purple:#7c3aed;--purple-mid:#6d28d9;--purple-dim:#5b21b6;
  --purple-glow:rgba(124,58,237,0.1);--border:rgba(124,58,237,0.22);
  --border-soft:rgba(0,0,0,0.07);--text:#1a0a2e;--text-muted:#5a4080;
  --text-dim:#9880b8;--card:#fff;--header-bg:rgba(245,240,255,0.92);
  --danger:#ef4444;--success:#22c55e
}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--purple-dim);border-radius:4px}
::-webkit-scrollbar-track{background:transparent}

#stars-canvas{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0;transition:opacity 0.8s}
.dark #stars-canvas{opacity:1}

#app{display:flex;flex-direction:column;height:100vh;position:relative;z-index:1}

header{
  position:sticky;top:0;z-index:200;height:58px;
  background:var(--header-bg);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0
}
.logo{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--purple),#f0a0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
.icon-btn{background:none;border:none;cursor:pointer;color:var(--text-muted);
  width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:20px;transition:all 0.18s}
.icon-btn:hover{background:var(--purple-glow);color:var(--purple)}
.material-symbols-outlined{font-family:'Material Symbols Outlined';font-weight:normal;font-style:normal;
  font-size:22px;line-height:1;letter-spacing:normal;text-transform:none;display:inline-block;
  white-space:nowrap;word-wrap:normal;direction:ltr}

#sidebar{position:fixed;top:0;left:0;height:100%;width:240px;background:var(--surface);
  border-right:1px solid var(--border);transform:translateX(-100%);
  transition:transform 0.22s cubic-bezier(.4,0,.2,1);z-index:300;display:flex;flex-direction:column}
#sidebar.open{transform:translateX(0)}
.sb-head{display:flex;align-items:center;gap:10px;padding:18px 16px 14px;border-bottom:1px solid var(--border-soft)}
.sb-logo{font-family:'Bebas Neue',sans-serif;font-size:19px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--purple),#f0a0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-close{margin-left:auto;background:none;border:none;cursor:pointer;color:var(--text-muted);font-size:20px;line-height:1}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 16px;cursor:pointer;
  color:var(--text-muted);font-size:14px;font-weight:500;transition:all 0.18s;
  border-left:3px solid transparent;user-select:none}
.nav-item:hover{color:var(--text);background:var(--purple-glow)}
.nav-item.active{color:var(--purple);border-left-color:var(--purple);background:rgba(124,58,237,0.1)}
.ni{font-size:17px;width:22px;text-align:center}
.sb-footer{padding:14px 16px;border-top:1px solid var(--border-soft);font-size:12px;color:var(--text-dim)}
.divider{height:1px;background:var(--border-soft);margin:6px 0}
#overlay{position:fixed;inset:0;background:rgba(0,0,0,0.55);opacity:0;pointer-events:none;
  transition:opacity 0.2s;z-index:290}
#overlay.active{opacity:1;pointer-events:all}

#content{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity 0.18s}
.page.active{opacity:1;pointer-events:all}
@keyframes pageIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.page.active{animation:pageIn 0.2s ease}

#site-footer{flex-shrink:0;background:var(--surface);border-top:1px solid var(--border-soft);
  padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap}
.fc{font-size:12px;color:var(--text-muted);font-weight:600}
.fd{display:inline-flex;align-items:center;gap:5px;color:var(--text-dim);text-decoration:none;
  font-size:12px;padding:3px 9px;border-radius:6px;
  background:rgba(88,101,242,0.1);border:1px solid rgba(88,101,242,0.2);transition:all 0.18s}
.fd:hover{color:#c7ceff;background:rgba(88,101,242,0.22)}
.fd svg{width:13px;height:13px;fill:currentColor;flex-shrink:0}
.fsep{width:1px;height:14px;background:var(--border-soft)}

#page-home{padding:24px 18px;display:flex;flex-direction:column;gap:18px}
.home-hero{text-align:center}
.home-hero h1{font-family:'Bebas Neue',sans-serif;
  font-size:clamp(38px,8vw,62px);letter-spacing:4px;line-height:1.05;
  background:linear-gradient(135deg,var(--purple),#f0a0ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.home-hero p{font-size:14px;color:var(--text-muted);margin:6px auto 0;max-width:380px}
.home-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:520px){.home-grid{grid-template-columns:repeat(4,1fr)}}
.home-card{background:var(--card);border:none;border-radius:16px;aspect-ratio:1/1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden}
.home-card::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 50% 0%,var(--purple-glow),transparent 70%);
  opacity:0;transition:opacity 0.2s}
.home-card:hover{transform:translateY(-4px);box-shadow:0 12px 32px rgba(124,58,237,0.22)}
.home-card:hover::before{opacity:1}
.home-card:active{transform:scale(0.96)}
.ci{font-size:34px;pointer-events:none}
.cl{font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:2px;color:var(--text);pointer-events:none}
.cs{font-size:11px;color:var(--text-dim);text-align:center;pointer-events:none}
.home-strip{flex:1;display:flex;flex-direction:column;gap:8px;min-height:0}
.strip-title{font-family:'Bebas Neue',sans-serif;font-size:14px;letter-spacing:2px;color:var(--text-dim)}
.strip-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;flex:1}
@media(min-width:520px){.strip-grid{grid-template-columns:repeat(4,1fr)}}
.iri{background:var(--surface2);border-radius:12px;padding:14px 14px;display:flex;
  gap:10px;align-items:flex-start;flex:1}
.iri-icon{font-size:22px;flex-shrink:0}
.iri strong{display:block;font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.iri span{font-size:12px;color:var(--text-muted);line-height:1.5}

.cat-page{display:flex;flex-direction:column;height:100%}
.sw{padding:14px 18px 10px;flex-shrink:0;background:var(--bg);border-bottom:1px solid var(--border-soft)}
.sb{display:flex;align-items:center;gap:8px;background:var(--surface2);
  border:1px solid var(--border-soft);border-radius:10px;padding:0 14px;transition:border-color 0.2s}
.sb:focus-within{border-color:var(--border)}
.sb input{flex:1;background:none;border:none;color:var(--text);font-size:14px;
  padding:10px 0;font-family:'Roboto',sans-serif}
.sb input::placeholder{color:var(--text-dim)}
.si{color:var(--text-dim);font-size:16px}

.games-list{flex:1;overflow-y:auto;padding:16px 18px 24px;display:flex;flex-direction:column;gap:16px}
.game-card{background:var(--card);border-radius:16px;overflow:hidden;
  border:1px solid var(--border-soft);transition:transform 0.25s,box-shadow 0.25s,border-color 0.25s;
  animation:cardIn 0.3s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.game-card:hover{transform:translateY(-4px);box-shadow:0 14px 40px rgba(0,0,0,0.4);border-color:var(--border)}
.gc-img-wrap{width:100%;aspect-ratio:16/9;overflow:hidden;background:var(--surface3);position:relative}
.gc-img-wrap img{width:100%;height:100%;object-fit:cover;display:block;transition:transform 0.35s}
.game-card:hover .gc-img-wrap img{transform:scale(1.04)}
.gc-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:52px}
.gc-body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:8px}
.gc-chip{display:inline-flex;background:rgba(168,85,247,0.15);color:var(--purple);
  font-size:10px;font-weight:700;padding:3px 10px;border-radius:999px;width:fit-content;letter-spacing:0.5px}
.gc-name{font-size:17px;font-weight:700;color:var(--text);line-height:1.3}
.gc-desc{font-size:13px;color:var(--text-muted);line-height:1.6}
.gc-links{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.gc-link{display:flex;align-items:center;justify-content:center;gap:7px;
  padding:11px 0;border-radius:12px;background:var(--purple-dim);color:#fff;
  font-size:14px;font-weight:700;text-decoration:none;transition:background 0.18s,transform 0.15s}
.gc-link:hover{background:var(--purple-mid)}
.gc-link:active{transform:scale(0.98)}
.gc-admin-btns{position:absolute;top:8px;left:8px;display:flex;gap:6px}
.gc-abtn{background:rgba(0,0,0,0.65);border:none;cursor:pointer;color:#fff;
  width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:15px;transition:background 0.18s}
.gc-abtn:hover{background:var(--purple)}
.gc-abtn.del:hover{background:#ef4444}
.gc-pin{position:absolute;top:8px;right:8px;background:var(--purple);color:#fff;
  border-radius:50%;width:30px;height:30px;display:flex;align-items:center;justify-content:center;font-size:15px}
.empty-state{text-align:center;padding:60px 24px;color:var(--text-dim)}
.empty-state .ei{font-size:48px;margin-bottom:14px}
.empty-state p{font-size:15px}
.sk-card{border-radius:16px;overflow:hidden;background:var(--card);border:1px solid var(--border-soft)}
.sk{background:linear-gradient(90deg,var(--surface2) 25%,var(--surface3) 50%,var(--surface2) 75%);
  background-size:800px 100%;animation:shimmer 1.4s infinite linear}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.sk-banner{width:100%;aspect-ratio:16/9}
.sk-body{padding:16px 18px 18px;display:flex;flex-direction:column;gap:10px}
.sk-chip{width:60px;height:18px;border-radius:999px}
.sk-title{width:65%;height:22px;border-radius:6px}
.sk-txt{width:100%;height:14px;border-radius:5px}
.sk-txt2{width:70%;height:14px;border-radius:5px}
.sk-btn{width:100%;height:42px;border-radius:12px}
.lmw{padding:12px 18px 4px;text-align:center;flex-shrink:0}
.lmbtn{background:var(--surface2);border:1px solid var(--border);color:var(--purple);
  font-size:13px;font-weight:600;padding:10px 28px;border-radius:10px;cursor:pointer;
  transition:all 0.18s;font-family:'Roboto',sans-serif;display:none}
.lmbtn:hover{background:var(--purple-glow)}

#page-info{padding:24px 20px 48px}
.info-sec{margin-bottom:24px}
.info-sec h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;color:var(--purple);margin-bottom:10px}
.info-sec p,.info-sec li{font-size:14px;color:var(--text-muted);line-height:1.7}
.info-sec ul{padding-left:18px;display:flex;flex-direction:column;gap:4px}
.doc-block{margin-top:28px;background:var(--surface2);border-radius:14px;padding:20px}
.doc-block h3{font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:1px;color:var(--text);margin-bottom:8px}
.doc-block p{font-size:13px;color:var(--text-muted);margin-bottom:12px}
.doc-row{display:flex;align-items:center;gap:8px;background:var(--surface3);
  border:1px solid var(--border-soft);border-radius:10px;padding:0 14px;
  transition:border-color 0.2s;max-width:440px}
.doc-row:focus-within{border-color:var(--border)}
.doc-row input{flex:1;background:none;border:none;color:var(--text);font-size:14px;
  padding:11px 0;font-family:'Roboto',sans-serif}
.doc-row input::placeholder{color:var(--text-dim)}
.doc-sbtn{background:none;border:none;cursor:pointer;color:var(--purple);
  font-size:13px;font-weight:700;padding:0 2px;font-family:'Roboto',sans-serif}
.doc-err{font-size:12px;color:var(--text-dim);margin-top:8px;display:none}

#page-admin{padding:20px 20px 40px;display:flex;flex-direction:column;gap:14px;overflow-y:auto}
.admin-head{display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.admin-head h1{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px}
.admin-badge{background:var(--purple);color:#fff;font-size:10px;font-weight:700;
  padding:3px 8px;border-radius:4px;letter-spacing:1px}
.admin-tabs{display:flex;border-bottom:1px solid var(--border-soft);flex-shrink:0}
.atab{padding:10px 18px;font-size:13px;font-weight:600;color:var(--text-dim);cursor:pointer;
  border-bottom:2px solid transparent;transition:all 0.18s;user-select:none}
.atab.active{color:var(--purple);border-bottom-color:var(--purple)}
.atab:hover:not(.active){color:var(--text-muted)}
.apanel{display:none}
.apanel.active{display:flex;flex-direction:column;gap:10px;padding-top:14px}
.fg{display:flex;flex-direction:column;gap:4px}
.fg label{font-size:12px;font-weight:600;color:var(--text-muted);letter-spacing:0.5px}
.fi{width:100%;background:var(--surface3);border:1px solid var(--border-soft);border-radius:8px;
  padding:10px 14px;color:var(--text);font-size:14px;font-family:'Roboto',sans-serif;transition:border-color 0.2s}
.fi:focus{border-color:var(--border)}
.fi::placeholder{color:var(--text-dim)}
textarea.fi{resize:vertical;min-height:56px}
select.fi{cursor:pointer;appearance:none}
select.fi option{background:var(--surface3)}
.fe{font-size:12px;color:var(--danger);margin-top:2px;display:none}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:480px){.row2{grid-template-columns:1fr}}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:9px 18px;
  border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;border:none;
  transition:all 0.18s;font-family:'Roboto',sans-serif}
.btn-primary{background:var(--purple-dim);color:#fff}
.btn-primary:hover{background:var(--purple-mid);box-shadow:0 4px 16px rgba(124,58,237,0.4)}
.btn-ghost{background:var(--surface2);color:var(--text-muted);border:1px solid var(--border-soft)}
.btn-ghost:hover{background:var(--surface3);color:var(--text)}
.btn-danger{background:rgba(239,68,68,0.12);color:var(--danger);border:1px solid rgba(239,68,68,0.22)}
.btn-danger:hover{background:rgba(239,68,68,0.22)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn:active{transform:scale(0.97)}
.mf{display:flex;gap:8px;flex-wrap:wrap}
.mfb{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;
  background:var(--surface2);border:1px solid var(--border-soft);color:var(--text-muted);transition:all 0.18s}
.mfb.active{background:var(--purple-dim);color:#fff;border-color:var(--purple-dim)}
.ml{display:flex;flex-direction:column;gap:8px}
.mc{display:flex;align-items:center;gap:10px;background:var(--surface2);
  border:1px solid var(--border-soft);border-radius:12px;padding:12px}
.mc-info{flex:1;min-width:0}
.mc-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mc-meta{font-size:11px;color:var(--text-dim);margin-top:2px}
.mc-acts{display:flex;gap:6px;flex-shrink:0}
.chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:700}
.chip-mobile{background:rgba(59,130,246,0.15);color:#93c5fd}
.chip-pc{background:rgba(34,197,94,0.15);color:#86efac}
.chip-emulador{background:rgba(251,146,60,0.15);color:#fdba74}
.chip-apps{background:rgba(168,85,247,0.15);color:#c4b5fd}
.link-row{background:var(--surface2);border:1px solid var(--border-soft);border-radius:10px;
  padding:10px;display:flex;flex-direction:column;gap:8px;margin-bottom:8px}
.link-inner{display:flex;gap:8px;align-items:flex-end}

.mbg{position:fixed;inset:0;background:rgba(0,0,0,0.72);backdrop-filter:blur(10px);
  display:flex;align-items:center;justify-content:center;z-index:500;
  opacity:0;pointer-events:none;transition:opacity 0.2s}
.mbg.open{opacity:1;pointer-events:all}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;
  padding:24px;width:90%;max-width:460px;max-height:90vh;overflow-y:auto;
  transform:scale(0.9) translateY(10px);transition:transform 0.25s cubic-bezier(.34,1.56,.64,1)}
.mbg.open .modal{transform:scale(1) translateY(0)}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:1px;margin-bottom:16px}

#toast{position:fixed;bottom:24px;right:24px;z-index:1000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.ti{background:var(--surface2);border:1px solid var(--border-soft);border-radius:10px;
  padding:12px 18px;font-size:13px;font-weight:500;min-width:200px;
  animation:tIn 0.22s ease;box-shadow:0 4px 24px rgba(0,0,0,0.45)}
.ti.out{animation:tOut 0.2s ease forwards}
.ti.success{border-color:rgba(74,222,128,0.3);color:#bbf7d0}
.ti.error{border-color:rgba(239,68,68,0.3);color:#fca5a5}
@keyframes tIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes tOut{from{opacity:1}to{opacity:0;transform:translateY(6px)}}
</style>
</head>
<body>
<canvas id="stars-canvas"></canvas>
<div id="app">
  <nav id="sidebar">
    <div class="sb-head">
      <div class="sb-logo">NEW GAMES</div>
      <button class="sb-close" onclick="closeSidebar()">✕</button>
    </div>
    <div class="sb-nav">
      <div class="nav-item active" data-page="home" onclick="navigate('home')"><span class="ni">🏠</span> Início</div>
      <div class="nav-item" data-page="mobile" onclick="navigate('mobile')"><span class="ni">📱</span> Mobile</div>
      <div class="nav-item" data-page="pc" onclick="navigate('pc')"><span class="ni">🖥️</span> PC</div>
      <div class="nav-item" data-page="emulador" onclick="navigate('emulador')"><span class="ni">🕹️</span> Emulador</div>
      <div class="nav-item" data-page="apps" onclick="navigate('apps')"><span class="ni">📦</span> Apps</div>
      <div class="divider"></div>
      <div class="nav-item" data-page="info" onclick="navigate('info')"><span class="ni">ℹ️</span> Informações</div>
    </div>
    <div class="sb-footer">New Games © 2025</div>
  </nav>
  <div id="overlay" onclick="closeSidebar()"></div>

  <header>
    <button class="icon-btn" onclick="openSidebar()">☰</button>
    <div class="logo">NEW GAMES</div>
    <button class="icon-btn" onclick="cycleTheme()" id="theme-btn">
      <span class="material-symbols-outlined" id="theme-icon">dark_mode</span>
    </button>
  </header>

  <div id="content">
    <section class="page active" id="page-home">
      <div class="home-hero">
        <h1>NEW GAMES</h1>
        <p>Sua plataforma completa de jogos e aplicativos.</p>
      </div>
